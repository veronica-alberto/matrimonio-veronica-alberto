<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP - Alberto e Veronica</title>

<style>
/* MENU BOTANICO DESKTOP & MOBILE */
nav.botanico {
    box-sizing: border-box;
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border-bottom: 2px solid #88A47C33;
    z-index: 9999;
    padding: 12px 0;
}

nav.botanico ul {
    display: flex;
    justify-content: center;
    gap: 35px;
    list-style: none;
    margin: 0;
    padding: 0;
}

nav.botanico a {
    font-family: Georgia, serif;
    font-size: 20px;
    text-decoration: none;
    color: #4C6A4F;
    font-weight: bold;
    position: relative;
    padding: 4px 8px;
}

nav.botanico a::after {
    content: "🍃";
    position: absolute;
    right: -18px;
    top: -4px;
    opacity: 0;
    font-size: 16px;
    transition: opacity 0.3s, transform 0.3s;
}
nav.botanico a:hover::after {
    opacity: 1;
    transform: translateY(-3px);
}
nav.botanico a:hover {
    color: #88A47C;
}

.hamburger {
    display: none;
    font-size: 32px;
    cursor: pointer;
    color: #4C6A4F;
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    line-height: 1;
}

nav.botanico ul.mobile {
    display: none;
    flex-direction: column;
    gap: 15px;
    background: rgba(255,255,255,0.97);
    padding: 20px 30px 25px;
    margin: 0;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    border-bottom: 2px solid #88A47C33;
}

nav.botanico ul.mobile.open {
    display: flex;
}

@media (max-width: 768px) {
    .hamburger { display: block; }
    nav.botanico ul.desktop { display: none; }
    nav.botanico { padding: 18px 0; min-height: 56px; }
    nav.botanico ul.mobile a { font-size: 22px; padding: 6px 0; }
}

/* STILI PAGINA */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #F9F7F2;
    color: #4C6A4F;
}

.container {
    max-width: 700px;
    margin: 50px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

p.subtitle {
    text-align: center;
    margin-bottom: 30px;
}

.section {
    background: white;
    padding: 25px;
    border-radius: 12px;
    border: 2px solid #88A47C;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 2px solid #88A47C;
    border-radius: 8px;
    font-size: 16px;
}

button {
    background: #88A47C;
    color: white;
    padding: 14px;
    margin-top: 25px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
}

button:hover {
    background: #4C6A4F;
}
</style>
</head>

<body>

<nav class="botanico">
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <ul class="desktop">
        <li><a href="index.html">Lista Nozze</a></li>
        <li><a href="dove-e-quando.html">Dove & Quando</a></li>
        <li><a href="rsvp.html">RSVP</a></li>
    </ul>

    <ul class="mobile" id="mobileMenu">
        <li><a href="index.html" onclick="toggleMenu()">Lista Nozze</a></li>
        <li><a href="dove-e-quando.html" onclick="toggleMenu()">Dove & Quando</a></li>
        <li><a href="rsvp.html" onclick="toggleMenu()">RSVP</a></li>
    </ul>
</nav>

<div class="container">

<h1>Conferma la tua presenza</h1>
<p class="subtitle">Facci sapere se potrai essere con noi 💚</p>

<div class="section">

<form onsubmit="sendRSVP(event)">

<label>Nome e Cognome</label>
<input type="text" id="nome" required>

<label>Parteciperai?</label>
<select id="presenza">
    <option value="Sì, partecipo">✅ Sì, partecipo</option>
    <option value="No, non potrò esserci">❌ No, non potrò esserci</option>
</select>

<label>Numero di persone</label>
<input type="number" id="persone" min="1" value="1">

<div id="altriOspiti"></div>

<label>Note (allergie, intolleranze, messaggi)</label>
<textarea id="note" rows="4"></textarea>

<button type="submit">Invia RSVP 💌</button>

</form>

</div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (menu) menu.classList.toggle("open");
}

function sendRSVP(event) {
    event.preventDefault();

    const nome = document.getElementById("nome").value;
    const presenza = document.getElementById("presenza").value;
    const persone = document.getElementById("persone").value;
    const note = document.getElementById("note").value;

    const ospitiExtraInputs = document.querySelectorAll(".ospite-extra");
    let ospitiExtra = "";

    ospitiExtraInputs.forEach((input, i) => {
        if (input.value.trim()) {
            ospitiExtra += `Ospite ${i + 2}: ${input.value}; `;
        }
    });

    fetch("https://script.google.com/macros/s/AKfycbwgZs0huq2_tPuVWurP0WM_4JnfFrG9kbPF3y81Ry_ZkpFffCud1N4vk9URTUnHRjKj7g/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nome,
            presenza,
            persone,
            ospiti_extra: ospitiExtra || "-",
            note: note || "-"
        })
    })
    .then(response => response.json())
    .then(() => {
        alert("Grazie! La tua conferma è stata registrata 💚");
        event.target.reset();
        document.getElementById("altriOspiti").innerHTML = "";
    })
    .catch(() => {
        alert("Errore durante l'invio. Riprova più tardi.");
    });
}

document.getElementById("persone").addEventListener("change", generaOspiti);

function generaOspiti() {
    const numero = parseInt(document.getElementById("persone").value);
    const container = document.getElementById("altriOspiti");

    container.innerHTML = "";

    if (numero > 1) {
        for (let i = 2; i <= numero; i++) {
            const label = document.createElement("label");
            label.innerText = `Nome e cognome ospite ${i}`;

            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Nome e Cognome";
            input.className = "ospite-extra";

            container.appendChild(label);
            container.appendChild(input);
        }
    }
}

</script>
